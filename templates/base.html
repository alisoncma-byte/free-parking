<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Free Parking NW{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f8f9fa; }
    .navbar { background: #1a1a2e; }
    .badge-mall    { background: #6c63ff; }
    .badge-grocery { background: #28a745; }
    .badge-lot     { background: #fd7e14; }
    .badge-other   { background: #6c757d; }
    .validation-yes { color: #dc3545; font-weight: 600; }
    .validation-no  { color: #28a745; font-weight: 600; }
    .snippet { font-size: .8rem; color: #6c757d; }
  </style>
</head>
<body>
  <nav class="navbar navbar-dark px-4 py-3 d-flex justify-content-between">
    <a href="/" class="navbar-brand fw-bold text-decoration-none">🅿 Free Parking &mdash; Metro Vancouver</a>
    <div class="d-flex gap-3">
      <a href="/list" class="nav-link text-white">List</a>
      <a href="/" class="nav-link text-white">Map</a>
    </div>
  </nav>
  <div class="container py-4">
    {% block content %}{% endblock %}
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
